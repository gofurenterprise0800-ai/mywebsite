<!DOCTYPE html>
<html>
<head>
<title>My Online Store</title>
<style>
body {
  font-family: Arial;
  margin: 0;
  background-color: #f4f4f4;
}

header {
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
}

.products {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  width: 200px;
  text-align: center;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: black;
  color: white;
  border: none;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background: green;
}
</style>
</head>

<body>

<header>
<h1>My Online Store 🛒</h1>
</header>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200" alt="Product">
<h3>Shoes</h3>
<p>₹999</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200" alt="Product">
<h3>T-Shirt</h3>
<p>₹499</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200" alt="Product">
<h3>Watch</h3>
<p>₹1499</p>
<button>Add to Cart</button>
</div>

</div>

</body>
</html>
