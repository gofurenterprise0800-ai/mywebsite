<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagla Babar Kapur</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
}

header {
  background: #000;
  color: white;
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  align-items: center;
}

.cart-box {
  background: red;
  padding: 5px 10px;
  border-radius: 20px;
}

.container {
  padding: 30px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 5px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: black;
  color: white;
  border: none;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 5px;
  margin-top: 5px;
}

button:hover {
  background: green;
}

/* Checkout Section */
.checkout {
  background: white;
  padding: 20px;
  margin: 30px;
  border-radius: 10px;
  display: none;
}

input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}
</style>
</head>
<header>
  <!-- Banner Section -->
<section class="banner">
  <div class="banner-content">
    <h1>Big Fashion Sale 🛍️</h1>
    <p>Up to 50% OFF on all products</p>
    <button onclick="scrollToProducts()">Shop Now</button>
  </div>
</section>
  <style>
    .banner {
  background: url('https://via.placeholder.com/1200x400') no-repeat center center/cover;
  height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.banner-content {
  background: rgba(0,0,0,0.5);
  padding: 20px;
  border-radius: 10px;
}

.banner button {
  margin-top: 10px;
  padding: 10px 20px;
  background: red;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

.banner button:hover {
  background: green;
}
<body>

<header>
  <h2>Urban Fashion 👕</h2>
  <div>
    Cart 🛒 <span class="cart-box" id="cart-count">0</span>
    <button onclick="showCheckout()">Checkout</button>
  </div>
</header>

<div class="container">
  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/250">
      <h3>Premium T-Shirt</h3>
      <p>₹599</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/250">
      <h3>Stylish Jeans</h3>
      <p>₹1299</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/250">
      <h3>Sport Shoes</h3>
      <p>₹1999</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

  </div>
</div>

<div class="checkout" id="checkout-section">
  <h3>Checkout Page 💳</h3>
  <input type="text" placeholder="Full Name">
  <input type="text" placeholder="Address">
  <input type="text" placeholder="Mobile Number">
  <button onclick="placeOrder()">Place Order</button>
</div>

<script>
let count = 0;

function addToCart() {
  count++;
  document.getElementById("cart-count").innerText = count;
}

function showCheckout() {
  document.getElementById("checkout-section").style.display = "block";
}

function placeOrder() {
  alert("Order Placed Successfully 🎉");
}
</script>

</body>
</html>
